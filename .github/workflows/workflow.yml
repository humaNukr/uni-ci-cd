name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: 1. Code Style Analysis (Spotless)
        run: ./gradlew spotlessCheck

      - name: 2. Automated Testing
        run: ./gradlew test

      - name: 3. Build Project (Create JAR)
        run: ./gradlew jar

      - name: 4. Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rental-service-build
          path: build/libs/*.jar
          retention-days: 7